name: C/C++ CI

on:
  push:
    branches: [ master, develop, issue-* ]
  pull_request:
    branches: [ master, develop ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: cmake
      run: cmake -DCMAKE_BUILD_TYPE=Release -DLIBIPC_BUILD_TESTS=ON .
    - name: make
      run: make -j
    - name: test
      run: export LD_LIBRARY_PATH=./lib:$LD_LIBRARY_PATH && ./bin/test-ipc
    - name: python binding smoke test
      run: |
        python -m pip install --upgrade pip
        python -m pip install ./python
        python ./python/tests/smoke_import.py
